# =============================================================================
# _quarto.yml  —  spotforecast2-safe Documentation
# =============================================================================
# Master project configuration for Quarto.
#
# Build pipeline:
#   1. docs/pre-render.py  → _variables.yml  (version extraction)
#   2. quartodoc build     → docs/reference/*.qmd  (API autodoc)
#   3. quarto render       → _site/  (full HTML site)
#   4. quarto publish      → gh-pages branch
#
# ⚠️  Safety-critical note: pin Quarto and quartodoc versions in CI to
#     guarantee reproducible renders across audit cycles.
# =============================================================================

project:
  type: website
  output-dir: _site

  # ── Render allowlist ──────────────────────────────────────────────────────
  # Without this, Quarto renders EVERY .md/.qmd/.ipynb in the repo
  # (CHANGELOG.md, MODEL_CARD.md, tests/*.md, scripts/*.ipynb, …)
  # and CHANGELOG.html ends up as the root index.  List only what belongs
  # in the documentation site.
  render:
    - "index.qmd"      # root home page (actual content, not a redirect)
    - "docs/**/*.qmd"  # all hand-written docs
    - "docs/**/*.md"   # any remaining markdown in docs/
    - "!docs/index.qmd" # excluded: content moved to root index.qmd

  # Pre-render hook: extracts version from pyproject.toml → _variables.yml
  # so that {{< var version >}} works in any .qmd file.
  pre-render: docs/pre-render.py

filters:
  - docs/interlinks.lua

interlinks:
  sources:
    python:
      url: "https://docs.python.org/3/"
    pandas:
      url: "https://pandas.pydata.org/docs/"
    numpy:
      url: "https://numpy.org/doc/stable/"

