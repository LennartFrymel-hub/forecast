        - preprocessing.split.split_abs_train_val_test
        - preprocessing.split.split_rel_train_val_test
        - preprocessing.exog_builder.ExogBuilder
        - preprocessing.imputation.WeightFunction
        - preprocessing.imputation.custom_weights
        - preprocessing.imputation.get_missing_weights
        - preprocessing.linearly_interpolate_ts
        - preprocessing.repeating_basis_function

    # ── Processing ────────────────────────────────────────────────────────────
    - title: "Processing"
      desc: |
        Utilities for aggregated and n-to-n predictions.
      contents:
        - processing.agg_predict.agg_predict
        - processing.n2n_predict.n2n_predict
        - processing.n2n_predict_with_covariates.n2n_predict_with_covariates

    # ── Forecaster ────────────────────────────────────────────────────────────
    - title: "Forecaster"
