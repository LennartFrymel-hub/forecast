# =============================================================================
# HTML output format
# =============================================================================
format:
  html:
    # Light/dark theme toggle — mirrors the MkDocs Material teal/slate palette
    theme:
      light: cosmo
      dark: darkly
    # Table of contents on every page
    toc: true
    toc-depth: 3
    toc-location: right
    # Code block features
    code-copy: true
    code-fold: false
    highlight-style: github
    # Math — MathJax renders $…$ inline and $$…$$ display blocks.
    # No additional configuration required; this is handled natively by Quarto.
    html-math-method: mathjax
    # Smooth anchor scrolling
    smooth-scroll: true
    # Link external URLs with an icon
    link-external-icon: true
    link-external-newwindow: true

# =============================================================================
# quartodoc — API reference generation
# =============================================================================
# Run `quartodoc build --config _quarto.yml` before `quarto render`.
# Generated files land in docs/reference/ and are committed to the repo (or
# generated fresh in CI before every render — see docs.yml workflow).
#
# Documentation: https://machow.github.io/quartodoc/
# =============================================================================
quartodoc:
  package: spotforecast2_safe
  # Path to the Python source tree (relative to this file)
  source_dir: src
  # Output directory for generated .qmd stub files
  dir: docs/reference
  # Google Docstring parser — matches the project's docstring_style setting
  parser: google
  # Enable cross-package interlinks using @-style references in docstrings
  render_interlinks: true

  sections:

    # ── Data ─────────────────────────────────────────────────────────────────
    - title: "Data"
      desc: |
        Utilities for fetching and loading time series, weather, and holiday data.
      contents:
        - data.fetch_data.fetch_data
        - data.fetch_data.fetch_holiday_data
        - data.fetch_data.fetch_weather_data
        - data.fetch_data.get_cache_home
        - data.fetch_data.get_data_home
        - data.fetch_data.get_package_data_home
        - data.fetch_data.load_timeseries
        - data.fetch_data.load_timeseries_forecast
        - data.data

    # ── Preprocessing ─────────────────────────────────────────────────────────
    - title: "Preprocessing"
      desc: |
        Hardened tools for data curation, resampling, outlier detection,
        feature engineering, and temporal train/test splitting.
      contents:
        - preprocessing.curate_data.agg_and_resample_data
        - preprocessing.curate_data.basic_ts_checks
        - preprocessing.curate_data.curate_holidays
        - preprocessing.curate_data.curate_weather
        - preprocessing.curate_data.get_start_end
        - preprocessing.curate_data.remove_duplicate_timestamps
